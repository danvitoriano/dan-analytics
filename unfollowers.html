  .stat { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px 20px; text-align: center; min-width: 130px; }
  .stat .val { font-size: 28px; font-weight: 700; color: #fff; }
  .stat .lbl { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
  .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }

  .search-bar input:focus { border-color: #833ab4; }
  .search-bar input::placeholder { color: #555; }
  .sort-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .sort-lbl { font-size: 11px; color: #555; }
  .sort-btn { background: #1a1a1a; border: 1px solid #333; color: #666; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .sort-btn.active { border-color: #833ab4; color: #c084fc; background: #1a1a2e; }
  .count { font-size: 12px; color: #555; margin-bottom: 12px; }
  .list { display: flex; flex-direction: column; gap: 2px; }
  .item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; background: #141414; border-radius: 8px; transition: background .1s; }
  .item:hover { background: #1e1e1e; }
  .item-num { font-size: 11px; color: #444; width: 28px; text-align: right; flex-shrink: 0; }
  .item-name { flex: 1; font-size: 14px; color: #e0e0e0; font-weight: 500; }
  .item-date { font-size: 11px; color: #555; white-space: nowrap; }
  .item-link { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 7px; background: #222; border: 1px solid #2a2a2a; color: #777; text-decoration: none; font-size: 14px; flex-shrink: 0; transition: all .15s; }
  .item-link:hover { background: #2a1a3a; border-color: #833ab4; color: #c084fc; }
  .item.deleted { opacity: .35; }
  .item.deleted .item-name { color: #555; font-style: italic; }
  .empty { text-align: center; padding: 60px; color: #444; font-size: 14px; }

  /* Login overlay */
  #login-overlay { position: fixed; inset: 0; background: #0f0f0f; display: flex; align-items: center; justify-content: center; z-index: 999; }
  .login-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 14px; padding: 40px 36px; width: 320px; text-align: center; }
  .login-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .login-box p { font-size: 13px; color: #666; margin-bottom: 24px; }
  .login-box input[type=password] { width: 100%; background: #111; border: 1px solid #333; color: #e0e0e0; padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none; }
  .login-box input[type=password]:focus { border-color: #833ab4; }
  .login-box button { width: 100%; background: linear-gradient(135deg, #833ab4, #fd1d1d); border: none; color: #fff; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .login-error { color: #e07070; font-size: 12px; margin-top: 8px; display: none; }

  @media (max-width: 600px) {
    main { padding: 14px; }

    .item-date { display: none; }
    .stat { min-width: 100px; padding: 12px 14px; }
    .stat .val { font-size: 22px; }
    .login-box { width: 88vw; padding: 30px 20px; }
  }
</style>

const DELETED = DATA.filter(d => d.username.startsWith('__deleted__'));
const ACTIVE  = DATA.filter(d => !d.username.startsWith('__deleted__'));

document.getElementById('stat-total').textContent   = DATA.length;
document.getElementById('stat-deleted').textContent = DELETED.length;
document.getElementById('stat-active').textContent  = ACTIVE.length;

let currentSort = 'date';

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + s).classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = DATA.filter(d => !q || d.username.toLowerCase().includes(q));

  if (currentSort === 'name') list.sort((a, b) => a.username.localeCompare(b.username));
  else if (currentSort === 'old') list.sort((a, b) => a.ts - b.ts);
  else list.sort((a, b) => b.ts - a.ts);

  document.getElementById('count').textContent = `${list.length} perfil${list.length !== 1 ? 'is' : ''}`;

  const html = list.map((d, i) => {
    const isDeleted = d.username.startsWith('__deleted__');
    const date = new Date(d.ts * 1000).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
    const name = isDeleted ? 'Conta deletada' : '@' + d.username;
    return `<div class="item${isDeleted ? ' deleted' : ''}">
      <span class="item-num">${i + 1}</span>
      <span class="item-name">${name}</span>
      <span class="item-date">seguindo desde ${date}</span>
      ${!isDeleted ? `<a class="item-link" href="${d.href}" target="_blank" title="Ver perfil">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>` : ''}
    </div>`;
  }).join('') || '<div class="empty">Nenhum resultado encontrado</div>';

  document.getElementById('list').innerHTML = html;
}

// Simple password check (same as main dashboard)
const PASS = '9832';
async function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === PASS) {
    document.getElementById('login-overlay').style.display = 'none';
    render();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
